name: Publish to NuGet

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: Publish NuGet packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for MinVer

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: dotnet restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Verify version matches tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          # Extract version from the built Domain .nupkg filename (MinVer sets it at build time)
          NUPKG=$(find src/Domain/bin/Release -name 'Boutquin.Storage.Domain.*.nupkg' ! -name '*.symbols.nupkg' | head -1)
          if [ -z "$NUPKG" ]; then
            echo "::error::No .nupkg found — build may have failed"
            exit 1
          fi
          VERSION=$(basename "$NUPKG" | sed 's/^Boutquin\.Storage\.Domain\.\(.*\)\.nupkg$/\1/')
          echo "Tag version: $TAG"
          echo "Package version: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag version ($TAG) does not match package version ($VERSION)"
            exit 1
          fi

      - name: Push to NuGet
        run: |
          dotnet nuget push "src/Domain/bin/Release/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "src/Infrastructure/bin/Release/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
